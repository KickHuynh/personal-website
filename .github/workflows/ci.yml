name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Build frontend
        run: npm run build

      - name: Verify backend app loads
        run: node -e "require('./backend/src/app'); console.log('backend-app-load-ok')"
