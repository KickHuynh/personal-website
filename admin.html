<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Portfolio Huỳnh Ngọc Tài</title>

  <!-- Styles (main variables + admin-specific) -->
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/admin.css" />
</head>

<body>

<main class="admin-page">

  <!-- ── LOGIN ─────────────────────────────────────────────────── -->
  <section class="admin-card" id="loginSection" aria-label="Đăng nhập admin">
    <h2>Đăng nhập Admin</h2>

    <form id="loginForm" class="admin-form" novalidate>
      <div>
        <label for="loginEmail">Email admin</label>
        <input
          type="email"
          id="loginEmail"
          name="email"
          placeholder="admin@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div>
        <label for="loginPassword">Mật khẩu</label>
        <input
          type="password"
          id="loginPassword"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary">Đăng nhập</button>
      <p id="loginMessage" class="admin-status" aria-live="polite"></p>
    </form>
  </section>

  <!-- ── DASHBOARD HEADER ───────────────────────────────────────── -->
  <section class="admin-card hidden" id="dashboardSection" aria-label="Thông tin admin">
    <div class="admin-actions">
      <h2>Admin Dashboard</h2>
      <button id="logoutBtn" class="btn btn-outline" type="button">Đăng xuất</button>
    </div>
    <p id="adminWelcome"></p>
  </section>

  <!-- ── PROJECTS ───────────────────────────────────────────────── -->
  <section class="admin-card hidden" id="projectSection" aria-label="Quản lý dự án">
    <h2>Thêm Project</h2>

    <form id="projectForm" class="admin-form" novalidate>
      <div>
        <label for="projectTitle">Tên dự án</label>
        <input type="text" id="projectTitle" name="title" placeholder="Tên dự án" required />
      </div>
      <div>
        <label for="projectDescription">Mô tả</label>
        <textarea id="projectDescription" name="description" placeholder="Mô tả dự án" required></textarea>
      </div>
      <div>
        <label for="projectTechStack">Tech stack</label>
        <input type="text" id="projectTechStack" name="tech_stack" placeholder="React, Node.js, ..." />
      </div>
      <div>
        <label for="projectGithubUrl">GitHub URL</label>
        <input type="url" id="projectGithubUrl" name="github_url" placeholder="https://github.com/..." />
      </div>
      <div>
        <label for="projectDemoUrl">Demo URL</label>
        <input type="url" id="projectDemoUrl" name="demo_url" placeholder="https://..." />
      </div>
      <div>
        <label for="projectImageUrl">Image URL</label>
        <input type="url" id="projectImageUrl" name="image_url" placeholder="https://..." />
      </div>
      <button type="submit" class="btn btn-primary">Thêm Project</button>
      <p id="projectMessage" class="admin-status" aria-live="polite"></p>
    </form>

    <hr class="admin-divider" />

    <div class="admin-actions">
      <h2>Danh sách Project</h2>
      <button id="loadProjectsBtn" class="btn btn-outline" type="button">Tải Project</button>
    </div>
    <p id="projectListStatus" class="admin-status" aria-live="polite"></p>
    <div id="adminProjectsList" class="admin-list"></div>
  </section>

  <!-- ── EDIT PROJECT ───────────────────────────────────────────── -->
  <section class="admin-card hidden" id="editProjectSection" aria-label="Chỉnh sửa dự án">
    <h2>Sửa Project</h2>

    <form id="editProjectForm" class="admin-form" novalidate>
      <input type="hidden" id="editProjectId" />
      <div>
        <label for="editProjectTitle">Tên dự án</label>
        <input type="text" id="editProjectTitle" name="title" placeholder="Tên dự án" required />
      </div>
      <div>
        <label for="editProjectDescription">Mô tả</label>
        <textarea id="editProjectDescription" name="description" placeholder="Mô tả dự án" required></textarea>
      </div>
      <div>
        <label for="editProjectTechStack">Tech stack</label>
        <input type="text" id="editProjectTechStack" name="tech_stack" placeholder="React, Node.js, ..." />
      </div>
      <div>
        <label for="editProjectGithubUrl">GitHub URL</label>
        <input type="url" id="editProjectGithubUrl" name="github_url" placeholder="https://github.com/..." />
      </div>
      <div>
        <label for="editProjectDemoUrl">Demo URL</label>
        <input type="url" id="editProjectDemoUrl" name="demo_url" placeholder="https://..." />
      </div>
      <div>
        <label for="editProjectImageUrl">Image URL</label>
        <input type="url" id="editProjectImageUrl" name="image_url" placeholder="https://..." />
      </div>

      <div class="admin-actions">
        <button type="submit" class="btn btn-primary">Cập nhật Project</button>
        <button type="button" id="cancelEditProjectBtn" class="btn btn-outline">Hủy</button>
      </div>
      <p id="editProjectMessage" class="admin-status" aria-live="polite"></p>
    </form>
  </section>

  <!-- ── SKILLS ─────────────────────────────────────────────────── -->
  <section class="admin-card hidden" id="skillSection" aria-label="Quản lý kỹ năng">
    <h2>Thêm Skill</h2>

    <form id="skillForm" class="admin-form" novalidate>
      <div>
        <label for="skillName">Tên kỹ năng</label>
        <input type="text" id="skillName" name="name" placeholder="JavaScript" required />
      </div>
      <div>
        <label for="skillLevel">Mức độ</label>
        <input type="text" id="skillLevel" name="level" placeholder="Intermediate" />
      </div>
      <div>
        <label for="skillCategory">Danh mục</label>
        <input type="text" id="skillCategory" name="category" placeholder="Frontend" />
      </div>
      <button type="submit" class="btn btn-primary">Thêm Skill</button>
      <p id="skillMessage" class="admin-status" aria-live="polite"></p>
    </form>

    <hr class="admin-divider" />

    <div class="admin-actions">
      <h2>Danh sách Skill</h2>
      <button id="loadSkillsBtn" class="btn btn-outline" type="button">Tải Skill</button>
    </div>
    <p id="skillListStatus" class="admin-status" aria-live="polite"></p>
    <div id="adminSkillsList" class="admin-list"></div>
  </section>

  <!-- ── EDIT SKILL ─────────────────────────────────────────────── -->
  <section class="admin-card hidden" id="editSkillSection" aria-label="Chỉnh sửa kỹ năng">
    <h2>Sửa Skill</h2>

    <form id="editSkillForm" class="admin-form" novalidate>
      <input type="hidden" id="editSkillId" />
      <div>
        <label for="editSkillName">Tên kỹ năng</label>
        <input type="text" id="editSkillName" name="name" placeholder="JavaScript" required />
      </div>
      <div>
        <label for="editSkillLevel">Mức độ</label>
        <input type="text" id="editSkillLevel" name="level" placeholder="Intermediate" />
      </div>
      <div>
        <label for="editSkillCategory">Danh mục</label>
        <input type="text" id="editSkillCategory" name="category" placeholder="Frontend" />
      </div>

      <div class="admin-actions">
        <button type="submit" class="btn btn-primary">Cập nhật Skill</button>
        <button type="button" id="cancelEditSkillBtn" class="btn btn-outline">Hủy</button>
      </div>
      <p id="editSkillMessage" class="admin-status" aria-live="polite"></p>
    </form>
  </section>

  <!-- ── MESSAGES ───────────────────────────────────────────────── -->
  <section class="admin-card hidden" id="messageSection" aria-label="Danh sách lời nhắn">
    <div class="admin-actions">
      <h2>Danh sách lời nhắn</h2>
      <button id="loadMessagesBtn" class="btn btn-outline" type="button">Tải lời nhắn</button>
    </div>
    <p id="messageStatus" class="admin-status" aria-live="polite"></p>
    <div id="messagesList" class="admin-list"></div>
  </section>

</main>

<!-- Script (type=module for ES import support) -->
<script type="module" src="scripts/admin.js"></script>

</body>
</html>
