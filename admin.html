<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Personal Website</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-page {
      padding: 40px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .admin-card h2 {
      margin-bottom: 16px;
    }

    .admin-form {
      display: grid;
      gap: 14px;
    }

    .admin-form input,
    .admin-form textarea,
    .admin-form select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 16px;
    }

    .admin-form textarea {
      resize: vertical;
      min-height: 120px;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .admin-status {
      margin-top: 10px;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    .admin-list {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .admin-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: #f8fafc;
    }

    .admin-item h3 {
      margin-bottom: 8px;
      font-size: 18px;
    }

    .admin-meta {
      font-size: 14px;
      color: #475569;
      margin-bottom: 10px;
    }

    .admin-item-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-empty {
      color: #64748b;
    }
  </style>
</head>
<body>
<main class="admin-page">
  <section class="admin-card" id="loginSection">
    <h2>Đăng nhập Admin</h2>
    <form id="loginForm" class="admin-form">
      <input type="email" id="loginEmail" placeholder="Email admin" required />
      <input type="password" id="loginPassword" placeholder="Mật khẩu" required />
      <button type="submit" class="btn btn-primary">Đăng nhập</button>
      <p id="loginMessage" class="admin-status"></p>
    </form>
  </section>

  <section class="admin-card hidden" id="dashboardSection">
    <div class="admin-actions">
      <h2>Admin Dashboard</h2>
      <button id="logoutBtn" class="btn btn-outline" type="button">Đăng xuất</button>
    </div>
    <p id="adminWelcome"></p>
  </section>

  <section class="admin-card hidden" id="projectSection">
    <h2>Thêm Project</h2>
    <form id="projectForm" class="admin-form">
      <input type="text" id="projectTitle" placeholder="Tên dự án" required />
      <textarea id="projectDescription" placeholder="Mô tả dự án" required></textarea>
      <input type="text" id="projectTechStack" placeholder="Tech stack" />
      <input type="text" id="projectGithubUrl" placeholder="GitHub URL" />
      <input type="text" id="projectDemoUrl" placeholder="Demo URL" />
      <input type="text" id="projectImageUrl" placeholder="Image URL" />
      <button type="submit" class="btn btn-primary">Thêm Project</button>
      <p id="projectMessage" class="admin-status"></p>
    </form>

    <hr style="margin: 24px 0;" />

    <div class="admin-actions">
      <h2>Danh sách Project</h2>
      <button id="loadProjectsBtn" class="btn btn-outline" type="button">Tải Project</button>
    </div>
    <p id="projectListStatus" class="admin-status"></p>
    <div id="adminProjectsList" class="admin-list"></div>
  </section>

  <section class="admin-card hidden" id="editProjectSection">
    <h2>Sửa Project</h2>
    <form id="editProjectForm" class="admin-form">
      <input type="hidden" id="editProjectId" />
      <input type="text" id="editProjectTitle" placeholder="Tên dự án" required />
      <textarea id="editProjectDescription" placeholder="Mô tả dự án" required></textarea>
      <input type="text" id="editProjectTechStack" placeholder="Tech stack" />
      <input type="text" id="editProjectGithubUrl" placeholder="GitHub URL" />
      <input type="text" id="editProjectDemoUrl" placeholder="Demo URL" />
      <input type="text" id="editProjectImageUrl" placeholder="Image URL" />

      <div class="admin-actions">
        <button type="submit" class="btn btn-primary">Cập nhật Project</button>
        <button type="button" id="cancelEditProjectBtn" class="btn btn-outline">Hủy</button>
      </div>

      <p id="editProjectMessage" class="admin-status"></p>
    </form>
  </section>

  <section class="admin-card hidden" id="skillSection">
    <h2>Thêm Skill</h2>
    <form id="skillForm" class="admin-form">
      <input type="text" id="skillName" placeholder="Tên kỹ năng" required />
      <input type="text" id="skillLevel" placeholder="Mức độ" />
      <input type="text" id="skillCategory" placeholder="Danh mục" />
      <button type="submit" class="btn btn-primary">Thêm Skill</button>
      <p id="skillMessage" class="admin-status"></p>
    </form>

    <hr style="margin: 24px 0;" />

    <div class="admin-actions">
      <h2>Danh sách Skill</h2>
      <button id="loadSkillsBtn" class="btn btn-outline" type="button">Tải Skill</button>
    </div>
    <p id="skillListStatus" class="admin-status"></p>
    <div id="adminSkillsList" class="admin-list"></div>
  </section>

  <section class="admin-card hidden" id="editSkillSection">
    <h2>Sửa Skill</h2>
    <form id="editSkillForm" class="admin-form">
      <input type="hidden" id="editSkillId" />
      <input type="text" id="editSkillName" placeholder="Tên kỹ năng" required />
      <input type="text" id="editSkillLevel" placeholder="Mức độ" />
      <input type="text" id="editSkillCategory" placeholder="Danh mục" />

      <div class="admin-actions">
        <button type="submit" class="btn btn-primary">Cập nhật Skill</button>
        <button type="button" id="cancelEditSkillBtn" class="btn btn-outline">Hủy</button>
      </div>

      <p id="editSkillMessage" class="admin-status"></p>
    </form>
  </section>

  <section class="admin-card hidden" id="messageSection">
    <div class="admin-actions">
      <h2>Danh sách lời nhắn</h2>
      <button id="loadMessagesBtn" class="btn btn-outline" type="button">Tải lời nhắn</button>
    </div>
    <p id="messageStatus" class="admin-status"></p>
    <div id="messagesList" class="admin-list"></div>
  </section>
</main>

<script src="js/admin.js"></script>
</body>
</html>
