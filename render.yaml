services:
  - type: web
    name: personal-website-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: static
    name: personal-website-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    publishDir: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /project
        destination: /project.html
      - type: rewrite
        source: /admin
        destination: /admin.html
